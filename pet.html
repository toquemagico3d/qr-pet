<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Encontrado</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  text-align:center;
  font-family: Arial, sans-serif;
  padding:20px;
}

.foto{
  width:200px;
  height:200px;
  border-radius:50%;
  object-fit:cover;
  margin:20px 0;
  border:4px solid #ddd;
}

.btn{
  display:block;
  margin:10px auto;
  padding:12px;
  width:200px;
  background:#2ecc71;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}
</style>

</head>

<body>

<h1>🐶 Encontrei este Pet</h1>

<img id="foto" class="foto" src="" alt="Foto do Pet">
<h2 id="nome">Carregando...</h2>
<p id="tutor"></p>

<a id="ligar" class="btn">📞 Ligar</a>
<button id="zap" class="btn">📍 Encontrei este Pet</button>
  
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<!-- Script -->
<script src="app.js"></script>

</body>
</html>
