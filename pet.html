<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🐶 Encontrei este Pet</h2>

<img id="foto" class="pet-img">

<h1 id="nome"></h1>

<p id="tutor"></p>

<a id="ligar" class="btn ligar">📞 Ligar</a>
<a id="zap" class="btn whatsapp">💬 WhatsApp</a>

<button onclick="encontrei()">📍 ENCONTREI ESTE PET</button>

</div>

<script>

let id = new URLSearchParams(location.search).get("id")
let pet = JSON.parse(localStorage.getItem("pet_"+id))

foto.src = pet.foto
nome.innerText = pet.nome
tutor.innerText = "Tutor: "+pet.tutor

ligar.href = "tel:"+pet.telefone
zap.href = "https://wa.me/55"+pet.telefone+"?text=Encontrei seu pet "+pet.nome

function encontrei(){

navigator.geolocation.getCurrentPosition(pos=>{

let map = "https://maps.google.com/?q="+pos.coords.latitude+","+pos.coords.longitude

window.open(
"https://wa.me/55"+pet.telefone+
"?text=Encontrei seu pet "+pet.nome+
" localização: "+map
)

})

}

</script>

</body>
</html>
