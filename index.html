<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Pet - Toque Mágico 3D</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🐶 Cadastro de Pet</h2>

<input id="nome" placeholder="Nome do Pet">
<input id="tutor" placeholder="Nome do Tutor">
<input id="telefone" placeholder="WhatsApp" maxlength="15">

<input type="file" id="foto" accept="image/*">

<img id="preview" class="pet-img">

<button onclick="cadastrar()">Cadastrar Pet</button>

<hr>

<h3>📋 Pets cadastrados</h3>
<div id="lista"></div>

</div>

<script src="app.js"></script>

</body>
</html>
